<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fotos da Festa</title>

<style>

body{
background:#f4e7dc;
font-family: "Segoe UI", sans-serif;
color:#6b4c3b;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
border-radius:20px;
padding:25px;
margin-bottom:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:10px;
}

.upload-area{
text-align:center;
margin-top:20px;
}

button{
background:#c88a5a;
border:none;
padding:12px 20px;
border-radius:20px;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.gallery{
margin-top:30px;
position:relative;
height:650px;
overflow:hidden;
border-radius:20px;
}

.gallery img{
width:100%;
height:100%;
object-fit:contain;
background:#ffffff;
position:absolute;
opacity:0;
transition:opacity 1s;
}

.gallery img.active{
opacity:1;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>📸 Álbum da Festa</h1>

<p style="text-align:center">
Compartilhe os momentos especiais da festa.<br>
Envie suas fotos para aparecerem no álbum!
</p>

<div class="upload-area">

<input type="file" id="photoInput" accept="image/*">

<br><br>

<button onclick="uploadPhoto()">
Enviar foto
</button>

</div>

</div>


<div class="card">

<h1>🎉 Fotos da Festa</h1>

<div class="gallery" id="gallery">
</div>

</div>

</div>

<script>

let images = []
let current = 0

function startCarousel(){

setInterval(()=>{

if(images.length === 0) return

const imgs = document.querySelectorAll("#gallery img")

imgs.forEach(img => img.classList.remove("active"))

current++

if(current >= images.length){
current = 0
}

imgs[current].classList.add("active")

},4000)

}

function addImage(url){

const gallery = document.getElementById("gallery")

const img = document.createElement("img")
img.src = url

if(images.length === 0){
img.classList.add("active")
}

gallery.appendChild(img)

images.push(url)

}

async function uploadPhoto(){

const fileInput = document.getElementById("photoInput")
const file = fileInput.files[0]

if(!file){
alert("Selecione uma foto primeiro")
return
}

const formData = new FormData()
formData.append("file", file)
formData.append("upload_preset", "festa_upload")

const response = await fetch(
"https://api.cloudinary.com/v1_1/dcpq0n3u5/image/upload",
{
method: "POST",
body: formData
}
)

const data = await response.json()

addImage(data.secure_url)

fileInput.value = ""

}

async function loadImages(){

try{

const response = await fetch(
"https://res.cloudinary.com/dcpq0n3u5/image/list/fotos_festa.json"
)

const data = await response.json()

data.resources.forEach(img=>{
addImage(img.secure_url)
})

}catch(e){

console.log("Ainda não existem fotos.")

}

}

loadImages()

startCarousel()

</script>

</body>
</html>
